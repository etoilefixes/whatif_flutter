name: flutter_client
description: "Flutter desktop client and integrated Dart runtime for Xujing WhatIf."
publish_to: 'none'

version: 1.0.2+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  archive: ^4.0.7
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.2
  google_fonts: ^6.3.2
  http: ^1.5.0
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  audioplayers: ^6.6.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.3
  yaml: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: WhatIfPixel
      fonts:
        - asset: assets/fonts/PressStart2P-Regular.ttf
